<!DOCTYPE html>
<html>
<head>
    <title>AI Task Planner</title>
</head>
<body>
    <h1>AI Task Planner</h1>
    
    <form method="POST">
        <textarea name="tasks" rows="10" cols="50" placeholder="Enter your tasks here...">{{ original_tasks }}</textarea>
        <br>
        <button type="submit">Generate Plan</button>
    </form>

    {% if result %}
        <hr> <h2>Summary</h2>
        <p>{{ result.summary }}</p>
        
        <h2>Categories</h2>
        <p style="white-space: pre-wrap;">{{ result.categories }}</p>
        
        <h2>Priority</h2>
        <p style="white-space: pre-wrap;">{{ result.priority }}</p>
    {% endif %}
</body>
</html>
